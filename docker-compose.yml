version: "3.9"

# ── Blue Ocean Hub — Docker Compose ──────────────────────────────────────────
# All 4 services run on a single Linux VM (GCP e2-medium).
# mt5-bridge now uses MetaAPI (cloud-native) — no Windows dependency.
#
# Ports exposed to the host:
#   8080 — backend only (Nginx reverse proxies this to port 80/443)
#   3306 — MySQL NOT exposed externally (internal Docker network only)
#   8001/8002 — internal only
#
# To start: docker compose up -d
# To view logs: docker compose logs -f
# To rebuild after code changes: docker compose up -d --build

services:

  mysql:
    image: mysql:8.3
    container_name: forexbot-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-forexbot}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    # NOT exposed on host — internal Docker network only
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mt5-bridge:
    build:
      context: ./mt5-bridge
      dockerfile: Dockerfile
    container_name: forexbot-mt5-bridge
    restart: unless-stopped
    env_file: .env
    # NOT exposed on host — only signal-engine and backend call it internally
    depends_on:
      mysql:
        condition: service_healthy

  signal-engine:
    build:
      context: ./signal-engine
      dockerfile: Dockerfile
    container_name: forexbot-signal-engine
    restart: unless-stopped
    env_file: .env
    environment:
      SIGNAL_MT5_BRIDGE_URL: http://mt5-bridge:8001
      SIGNAL_BACKEND_URL: http://backend:8080
    volumes:
      - signal_models:/app/models
    # NOT exposed on host — backend calls it internally
    depends_on:
      mysql:
        condition: service_healthy
      mt5-bridge:
        condition: service_started

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forexbot-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      MT5_BRIDGE_URL: http://mt5-bridge:8001
      SIGNAL_ENGINE_URL: http://signal-engine:8002
      PAPER_TRADING: ${PAPER_TRADING:-true}
    ports:
      - "8080:8080"   # Nginx on the VM reverse proxies this
    depends_on:
      mysql:
        condition: service_healthy
      signal-engine:
        condition: service_started

volumes:
  mysql_data:    # persists across container restarts
  signal_models: # persists trained ML models
