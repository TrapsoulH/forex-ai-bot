<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#000000"/>
  <!-- Globe wireframe -->
  <g stroke="#29B6F6" stroke-width="1.1" fill="none" opacity="0.95">
    <circle cx="32" cy="32" r="22"/>
    <!-- Latitude lines -->
    <ellipse cx="32" cy="32" rx="22" ry="5"/>
    <ellipse cx="32" cy="32" rx="22" ry="11"/>
    <ellipse cx="32" cy="32" rx="22" ry="17"/>
    <line x1="10" y1="32" x2="54" y2="32"/>
    <!-- Longitude lines -->
    <ellipse cx="32" cy="32" rx="5" ry="22"/>
    <ellipse cx="32" cy="32" rx="11" ry="22"/>
    <ellipse cx="32" cy="32" rx="17" ry="22"/>
    <line x1="32" y1="10" x2="32" y2="54"/>
    <!-- Diagonal great circles -->
    <ellipse cx="32" cy="32" rx="22" ry="8" transform="rotate(45 32 32)"/>
    <ellipse cx="32" cy="32" rx="22" ry="8" transform="rotate(-45 32 32)"/>
    <ellipse cx="32" cy="32" rx="22" ry="8" transform="rotate(30 32 32)"/>
    <ellipse cx="32" cy="32" rx="22" ry="8" transform="rotate(-30 32 32)"/>
  </g>
</svg>
