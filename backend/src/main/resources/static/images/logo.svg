<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#000000"/>

  <!-- Globe wireframe -->
  <g stroke="#29B6F6" stroke-width="1.4" fill="none" opacity="0.9">
    <!-- Outer circle -->
    <circle cx="200" cy="200" r="110"/>

    <!-- Latitude lines -->
    <ellipse cx="200" cy="200" rx="110" ry="25"/>
    <ellipse cx="200" cy="200" rx="110" ry="55"/>
    <ellipse cx="200" cy="200" rx="110" ry="85"/>
    <line x1="90" y1="200" x2="310" y2="200"/>

    <!-- Longitude lines (vertical ellipses rotated) -->
    <ellipse cx="200" cy="200" rx="25" ry="110"/>
    <ellipse cx="200" cy="200" rx="55" ry="110"/>
    <ellipse cx="200" cy="200" rx="85" ry="110"/>
    <line x1="200" y1="90" x2="200" y2="310"/>

    <!-- Diagonal great circles -->
    <ellipse cx="200" cy="200" rx="110" ry="42" transform="rotate(45 200 200)"/>
    <ellipse cx="200" cy="200" rx="110" ry="42" transform="rotate(-45 200 200)"/>
    <ellipse cx="200" cy="200" rx="110" ry="42" transform="rotate(30 200 200)"/>
    <ellipse cx="200" cy="200" rx="110" ry="42" transform="rotate(-30 200 200)"/>
    <ellipse cx="200" cy="200" rx="110" ry="42" transform="rotate(60 200 200)"/>
    <ellipse cx="200" cy="200" rx="110" ry="42" transform="rotate(-60 200 200)"/>
  </g>

  <!-- Curved "BLUE OCEAN HUB" text path -->
  <defs>
    <path id="topArc" d="M 60,200 A 140,140 0 0,1 340,200"/>
    <path id="bottomArc" d="M 80,230 A 125,125 0 0,0 320,230"/>
  </defs>

  <text font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="28" fill="#29B6F6" letter-spacing="4">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">BLUE OCEAN HUB</textPath>
  </text>

  <!-- "FOUNDED 2026" straight text below globe -->
  <text x="200" y="355" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="18" fill="#FFFFFF" letter-spacing="5" text-anchor="middle">FOUNDED 2026</text>
</svg>
