<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="|${trade.direction} ${trade.symbol} — Blue Ocean Hub|">Trade Alert</title>
</head>
<body style="margin:0;padding:0;background:#060d18;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#f1f5f9">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#060d18;padding:40px 16px">
  <tr>
    <td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%">

        <!-- ── Header ── -->
        <tr>
          <td style="padding-bottom:24px;text-align:center">
            <div style="display:inline-flex;align-items:center;gap:10px;margin-bottom:16px">
              <div style="width:36px;height:36px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:9px;display:inline-block;vertical-align:middle;line-height:36px;text-align:center;font-weight:900;font-size:18px;color:#fff">⚡</div>
              <span style="font-weight:800;font-size:1.1rem;color:#f1f5f9;vertical-align:middle">Blue Ocean <span style="color:#10b981">Hub</span></span>
            </div>
            <div style="font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase"
                 th:style="${trade.direction == 'BUY'} ? 'color:#10b981' : 'color:#ef4444'"
                 th:text="${trade.direction == 'BUY'} ? 'New buy signal' : 'New sell signal'">Trade alert</div>
          </td>
        </tr>

        <!-- ── Direction banner ── -->
        <tr>
          <td style="padding-bottom:24px">
            <div th:style="${trade.direction == 'BUY'}
                           ? 'background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:14px;padding:24px;text-align:center'
                           : 'background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:14px;padding:24px;text-align:center'">
              <!-- Symbol + direction -->
              <div style="display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap">
                <span style="font-size:1.6rem;font-weight:900;color:#f1f5f9;font-family:monospace"
                      th:text="${trade.symbol}">EURUSD</span>
                <span style="font-size:1.1rem;font-weight:800;padding:6px 20px;border-radius:100px;letter-spacing:.06em"
                      th:style="${trade.direction == 'BUY'}
                                 ? 'background:rgba(16,185,129,.2);color:#34d399;border:1px solid rgba(16,185,129,.4)'
                                 : 'background:rgba(239,68,68,.2);color:#f87171;border:1px solid rgba(239,68,68,.4)'"
                      th:text="${trade.direction}">BUY</span>
              </div>
              <!-- Confidence -->
              <div style="margin-top:12px;font-size:.85rem;font-weight:600"
                   th:style="${trade.direction == 'BUY'} ? 'color:#6ee7b7' : 'color:#fca5a5'"
                   th:text="${trade.signalConfidence != null}
                             ? |${#numbers.formatDecimal(trade.signalConfidence * 100, 1, 1)}% confidence|
                             : 'Confidence N/A'">87.0% confidence</div>
              <!-- Paper badge -->
              <div th:if="${trade.paperTrade}" style="margin-top:8px">
                <span style="font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.25);padding:3px 10px;border-radius:100px">Paper trade</span>
              </div>
            </div>
          </td>
        </tr>

        <!-- ── Trade details grid ── -->
        <tr>
          <td style="padding-bottom:24px">
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td width="48%" style="background:rgba(13,31,53,.8);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:16px;text-align:center">
                  <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;margin-bottom:6px">Volume</div>
                  <div style="font-size:1.4rem;font-weight:800;color:#f1f5f9;font-family:monospace"
                       th:text="${trade.volume}">0.01</div>
                  <div style="font-size:.72rem;color:#334155;margin-top:4px">Lots</div>
                </td>
                <td width="4%"></td>
                <td width="48%" style="background:rgba(13,31,53,.8);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:16px;text-align:center">
                  <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;margin-bottom:6px">Open Price</div>
                  <div style="font-size:1.4rem;font-weight:800;color:#f1f5f9;font-family:monospace"
                       th:text="${trade.openPrice != null ? trade.openPrice : '—'}">1.08500</div>
                  <div style="font-size:.72rem;color:#334155;margin-top:4px">Entry</div>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- ── Opened at ── -->
        <tr>
          <td style="padding-bottom:24px">
            <div style="background:rgba(13,31,53,.8);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between">
              <span style="font-size:.78rem;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.06em">Opened at</span>
              <span style="font-size:.85rem;font-weight:700;color:#94a3b8;font-family:monospace"
                    th:text="${#temporals.format(trade.openedAt, 'dd MMM yyyy HH:mm:ss')} + ' UTC'">—</span>
            </div>
          </td>
        </tr>

        <!-- ── CTA ── -->
        <tr>
          <td style="text-align:center;padding-bottom:36px">
            <a th:href="${dashboardUrl}"
               style="display:inline-block;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;text-decoration:none;padding:14px 32px;border-radius:10px;font-weight:700;font-size:.95rem">
              View on dashboard
            </a>
          </td>
        </tr>

        <!-- ── Footer ── -->
        <tr>
          <td style="text-align:center;padding-top:16px;border-top:1px solid rgba(255,255,255,.06)">
            <p style="font-size:.75rem;color:#1e3a5f;margin:0">
              Blue Ocean Hub · Developed by Harvest Technologies<br/>
              You're receiving this because you have an account on this platform.
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
