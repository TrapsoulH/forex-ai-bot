<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found · Harvest Technologies</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div style="position:relative;z-index:1;max-width:440px">
  <div style="font-size:6rem;font-weight:900;line-height:1;background:linear-gradient(135deg,#3b82f6,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px">404</div>
  <h1 style="font-size:1.4rem;font-weight:700;color:#f1f5f9;margin-bottom:12px">Page not found</h1>
  <p style="color:#64748b;font-size:.9rem;line-height:1.6;margin-bottom:32px">
    This page doesn't exist or may have been moved.
  </p>
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
    <a th:href="@{/dashboard}" class="btn btn-primary btn-md"><i data-lucide="layout-dashboard"></i> Go to dashboard</a>
    <a th:href="@{/}" class="btn btn-outline btn-md"><i data-lucide="home"></i> Home</a>
  </div>
</div>

<script>document.addEventListener('DOMContentLoaded', () => lucide.createIcons());</script>
</body>
</html>
