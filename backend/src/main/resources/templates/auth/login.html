<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Harvest Technologies</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #7d8590;
      --green:   #3fb950;
      --red:     #f85149;
      --blue:    #58a6ff;
      --gold:    #d29922;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: -0.3px;
    }
    .brand-tag {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 32px;
      width: 100%;
      max-width: 360px;
    }

    .card h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--text);
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--blue); }

    .alert-error {
      background: rgba(248,81,73,.1);
      border: 1px solid rgba(248,81,73,.3);
      color: var(--red);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .alert-success {
      background: rgba(63,185,80,.1);
      border: 1px solid rgba(63,185,80,.3);
      color: var(--green);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: var(--blue);
      color: #000;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 8px;
    }
    .btn-primary:hover { opacity: 0.88; }

    footer {
      margin-top: 32px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--blue); }
  </style>
</head>
<body>

  <div class="brand">
    <div class="brand-name">⚡ Harvest Technologies</div>
    <div class="brand-tag">AI-Powered Forex Trading Platform</div>
  </div>

  <div class="card">
    <h1>Sign in</h1>

    <div th:if="${param.error}" class="alert-error">
      Invalid username or password. Please try again.
    </div>
    <div th:if="${param.logout}" class="alert-success">
      You have been signed out successfully.
    </div>

    <form th:action="@{/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" name="username" autocomplete="username" autofocus required/>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" autocomplete="current-password" required/>
      </div>

      <button type="submit" class="btn-primary">Sign in</button>
    </form>
  </div>

  <footer>
    &copy; 2025 <a href="#">Harvest Technologies</a>. All rights reserved.
  </footer>

</body>
</html>
