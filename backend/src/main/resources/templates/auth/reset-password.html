<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Harvest Technologies</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="page-sm" style="padding:0;width:100%">

  <div class="au" style="text-align:center;margin-bottom:32px">
    <a href="/" style="display:inline-flex;align-items:center;gap:10px;text-decoration:none;justify-content:center">
      <div class="logo-box"><i data-lucide="zap"></i></div>
      <span class="logo-name">Harvest <span class="gradient-text">Technologies</span></span>
    </a>
    <div style="margin-top:24px">
      <div class="ic ic-lg ic-green" style="margin:0 auto 12px"><i data-lucide="shield-check"></i></div>
      <h1 style="font-size:1.25rem;font-weight:700;color:#f1f5f9;margin:0 0 6px">Choose a new password</h1>
      <p style="color:#334155;font-size:.875rem">Pick something strong — 8+ chars, uppercase, number &amp; special character.</p>
    </div>
  </div>

  <div class="auth-card au1">

    <!-- Invalid / expired token -->
    <div th:if="${error != null and form == null}" class="alert alert-error" style="margin-bottom:20px">
      <i data-lucide="alert-triangle"></i>
      <span th:text="${error}"></span>
    </div>

    <!-- Form error -->
    <div th:if="${error != null and form != null}" class="alert alert-error" style="margin-bottom:20px">
      <i data-lucide="alert-circle"></i>
      <span th:text="${error}"></span>
    </div>

    <form th:if="${form != null}" th:action="@{/reset-password}" th:object="${form}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" th:field="*{token}"/>

      <div style="margin-bottom:14px">
        <label class="label">New password</label>
        <div class="input-wrap">
          <i data-lucide="lock" class="i-pfx"></i>
          <input type="password" id="reset-pw" th:field="*{password}" class="input" placeholder="••••••••" required autocomplete="new-password"/>
        </div>
        <div class="pwd-reqs">
          <span class="pwd-req" id="req-len"><i data-lucide="circle" style="width:10px;height:10px"></i> 8+ characters</span>
          <span class="pwd-req" id="req-upper"><i data-lucide="circle" style="width:10px;height:10px"></i> Uppercase letter</span>
          <span class="pwd-req" id="req-num"><i data-lucide="circle" style="width:10px;height:10px"></i> Number</span>
          <span class="pwd-req" id="req-spec"><i data-lucide="circle" style="width:10px;height:10px"></i> Special character</span>
        </div>
        <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
      </div>

      <div style="margin-bottom:24px">
        <label class="label">Confirm new password</label>
        <div class="input-wrap">
          <i data-lucide="lock-keyhole" class="i-pfx"></i>
          <input type="password" th:field="*{confirmPassword}" class="input" placeholder="••••••••" required autocomplete="new-password"/>
        </div>
      </div>

      <button type="submit" class="btn btn-green btn-lg btn-block">
        <i data-lucide="check"></i> Update password
      </button>
    </form>

    <div th:if="${form == null}" style="text-align:center;margin-top:8px">
      <a th:href="@{/forgot-password}" class="btn btn-ghost btn-md">
        <i data-lucide="send"></i> Request new reset link
      </a>
    </div>

    <div class="divider"></div>
    <p style="text-align:center;font-size:.85rem;color:#334155">
      <a th:href="@{/login}" style="color:#3b82f6;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:5px">
        <i data-lucide="arrow-left" style="width:13px;height:13px"></i> Back to sign in
      </a>
    </p>
  </div>

  <p style="text-align:center;margin-top:28px;font-size:.75rem;color:#1e3a5f">
    &copy; 2025 Harvest Technologies
  </p>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  const pwd = document.getElementById('reset-pw');
  if (!pwd) return;
  const rules = {
    'req-len':   p => p.length >= 8,
    'req-upper': p => /[A-Z]/.test(p),
    'req-num':   p => /\d/.test(p),
    'req-spec':  p => /[^a-zA-Z0-9]/.test(p),
  };
  pwd.addEventListener('input', function() {
    Object.entries(rules).forEach(([id, test]) => {
      const el = document.getElementById(id);
      const ok = test(this.value);
      el.classList.toggle('ok', ok);
      el.innerHTML = `<i data-lucide="${ok ? 'check-circle' : 'circle'}" style="width:10px;height:10px"></i> ` + el.textContent.replace(/^\S+\s*/, '');
    });
    lucide.createIcons();
  });
});
</script>
</body>
</html>
