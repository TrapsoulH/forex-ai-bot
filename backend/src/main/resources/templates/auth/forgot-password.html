<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — Blue Ocean Hub</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="page-sm" style="padding:0;width:100%">

  <div class="au" style="text-align:center;margin-bottom:32px">
    <a href="/" style="display:inline-flex;flex-direction:column;align-items:center;gap:6px;text-decoration:none">
      <img src="/images/logo.svg" alt="Blue Ocean Hub" style="width:140px;height:140px;object-fit:contain"/>
    </a>
    <div style="margin-top:24px">
      <div class="ic ic-lg ic-blue" style="margin:0 auto 12px"><i data-lucide="key-round"></i></div>
      <h1 style="font-size:1.25rem;font-weight:700;color:#f1f5f9;margin:0 0 6px">Reset your password</h1>
      <p style="color:#334155;font-size:.875rem">Enter your email and we'll send a reset link if your account exists.</p>
    </div>
  </div>

  <div class="auth-card au1">
    <div th:if="${success}" class="alert alert-success" style="margin-bottom:20px">
      <i data-lucide="check-circle"></i>
      <span th:text="${success}"></span>
    </div>

    <form th:action="@{/forgot-password}" th:object="${form}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div style="margin-bottom:20px">
        <label class="label">Email address</label>
        <div class="input-wrap">
          <i data-lucide="mail" class="i-pfx"></i>
          <input type="email" th:field="*{email}" class="input" placeholder="you@example.com" required autofocus autocomplete="email"/>
        </div>
        <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-block">
        <i data-lucide="send"></i> Send reset link
      </button>
    </form>

    <div class="divider"></div>
    <p style="text-align:center;font-size:.85rem;color:#334155">
      <a th:href="@{/login}" style="color:#3b82f6;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:5px">
        <i data-lucide="arrow-left" style="width:13px;height:13px"></i> Back to sign in
      </a>
    </p>
  </div>

  <p style="text-align:center;margin-top:28px;font-size:.75rem;color:#1e3a5f">
    &copy; 2026 Blue Ocean Hub
  </p>
</div>
<script>document.addEventListener('DOMContentLoaded',()=>lucide.createIcons());</script>
</body>
</html>
