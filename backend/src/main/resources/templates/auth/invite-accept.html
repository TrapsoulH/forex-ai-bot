<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Set Up Your Account — Blue Ocean Hub</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="page-sm" style="padding:0;width:100%">

  <!-- Logo -->
  <div class="au" style="text-align:center;margin-bottom:32px">
    <a href="/" style="display:inline-flex;align-items:center;gap:10px;text-decoration:none;justify-content:center">
      <div class="logo-box"><i data-lucide="zap"></i></div>
      <span class="logo-name">Blue <span class="gradient-text">Ocean Hub</span></span>
    </a>
    <div style="margin-top:24px">
      <div class="ic ic-lg ic-green" style="margin:0 auto 12px"><i data-lucide="user-check"></i></div>
      <h1 style="font-size:1.25rem;font-weight:700;color:#f1f5f9;margin:0 0 6px">Set up your account</h1>
      <p style="color:#64748b;font-size:.875rem">
        You've been invited to join the AI Forex Trading Platform.
        <span th:if="${email != null}">
          <br/>Signing in as <strong style="color:#60a5fa" th:text="${email}"></strong>
        </span>
      </p>
    </div>
  </div>

  <div class="auth-card au1">

    <!-- Invalid / expired invite -->
    <div th:if="${error != null and form == null}" class="alert alert-error" style="margin-bottom:20px">
      <i data-lucide="alert-triangle"></i>
      <span th:text="${error}"></span>
    </div>
    <div th:if="${error != null and form == null}" style="text-align:center;margin-top:12px">
      <p style="font-size:.85rem;color:#64748b">Contact your admin to resend the invitation.</p>
    </div>

    <!-- Setup form -->
    <form th:if="${form != null}" th:action="@{/invite/accept}" th:object="${form}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" th:field="*{token}"/>

      <!-- Form error -->
      <div th:if="${error != null}" class="alert alert-error" style="margin-bottom:20px">
        <i data-lucide="alert-circle"></i>
        <span th:text="${error}"></span>
      </div>

      <div style="margin-bottom:14px">
        <label class="label">Full name</label>
        <div class="input-wrap">
          <i data-lucide="user" class="i-pfx"></i>
          <input type="text" th:field="*{fullName}" class="input" placeholder="Your full name" required autofocus autocomplete="name"/>
        </div>
        <p class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
      </div>

      <div style="margin-bottom:14px">
        <label class="label">Password</label>
        <div class="input-wrap">
          <i data-lucide="lock" class="i-pfx"></i>
          <input type="password" id="inv-pw" th:field="*{password}" class="input" placeholder="••••••••" required autocomplete="new-password"/>
        </div>
        <div class="pwd-reqs">
          <span class="pwd-req" id="req-len"><i data-lucide="circle" style="width:10px;height:10px"></i> 8+ characters</span>
          <span class="pwd-req" id="req-upper"><i data-lucide="circle" style="width:10px;height:10px"></i> Uppercase letter</span>
          <span class="pwd-req" id="req-num"><i data-lucide="circle" style="width:10px;height:10px"></i> Number</span>
          <span class="pwd-req" id="req-spec"><i data-lucide="circle" style="width:10px;height:10px"></i> Special character</span>
        </div>
        <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
      </div>

      <div style="margin-bottom:24px">
        <label class="label">Confirm password</label>
        <div class="input-wrap">
          <i data-lucide="lock-keyhole" class="i-pfx"></i>
          <input type="password" th:field="*{confirmPassword}" class="input" placeholder="••••••••" required autocomplete="new-password"/>
        </div>
        <p class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
      </div>

      <button type="submit" class="btn btn-green btn-lg btn-block">
        <i data-lucide="check"></i> Activate my account
      </button>
    </form>

    <div class="divider"></div>
    <p style="text-align:center;font-size:.83rem;color:#64748b">
      Already have an account?
      <a th:href="@{/login}" style="color:#3b82f6;font-weight:600">Sign in</a>
    </p>
  </div>

  <p style="text-align:center;margin-top:28px;font-size:.75rem;color:#1e3a5f">
    &copy; 2025 Blue Ocean Hub
  </p>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  const pwd = document.getElementById('inv-pw');
  if (!pwd) return;
  const rules = {
    'req-len':   p => p.length >= 8,
    'req-upper': p => /[A-Z]/.test(p),
    'req-num':   p => /\d/.test(p),
    'req-spec':  p => /[^a-zA-Z0-9]/.test(p),
  };
  pwd.addEventListener('input', function () {
    Object.entries(rules).forEach(([id, test]) => {
      const el = document.getElementById(id);
      const ok = test(this.value);
      el.classList.toggle('ok', ok);
      el.innerHTML = `<i data-lucide="${ok ? 'check-circle' : 'circle'}" style="width:10px;height:10px"></i> ` + el.textContent.replace(/^\S+\s*/, '');
    });
    lucide.createIcons();
  });
});
</script>
</body>
</html>
