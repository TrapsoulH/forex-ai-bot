<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — Blue Ocean Hub</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div style="width:100%;max-width:500px;position:relative;z-index:1">

  <!-- Logo -->
  <div class="au" style="text-align:center;margin-bottom:32px">
    <a href="/" style="display:inline-flex;align-items:center;gap:10px;text-decoration:none">
      <div class="logo-box"><i data-lucide="zap"></i></div>
      <span class="logo-name">Blue <span class="gradient-text">Ocean Hub</span></span>
    </a>
    <p style="color:#334155;font-size:.875rem;margin-top:10px">Create your trading account</p>
  </div>

  <div class="auth-card au1">
    <h1 style="font-size:1.2rem;font-weight:700;color:#f1f5f9;margin:0 0 24px">Create account</h1>

    <div th:if="${registrationError}" class="alert alert-error" style="margin-bottom:20px">
      <i data-lucide="alert-circle"></i>
      <span th:text="${registrationError}"></span>
    </div>

    <form th:action="@{/register}" th:object="${form}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
        <div>
          <label class="label">Full name</label>
          <div class="input-wrap">
            <i data-lucide="user" class="i-pfx"></i>
            <input type="text" th:field="*{fullName}" class="input" placeholder="Jane Smith" required autofocus/>
          </div>
          <p class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
        </div>
        <div>
          <label class="label">Username</label>
          <div class="input-wrap">
            <i data-lucide="at-sign" class="i-pfx"></i>
            <input type="text" th:field="*{username}" class="input" placeholder="jane_smith" required/>
          </div>
          <p class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
        </div>
      </div>

      <div style="margin-bottom:14px">
        <label class="label">Email address</label>
        <div class="input-wrap">
          <i data-lucide="mail" class="i-pfx"></i>
          <input type="email" th:field="*{email}" class="input" placeholder="you@example.com" required/>
        </div>
        <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
      </div>

      <div style="margin-bottom:14px">
        <label class="label">Password</label>
        <div class="input-wrap">
          <i data-lucide="lock" class="i-pfx"></i>
          <input type="password" id="reg-password" th:field="*{password}" class="input" placeholder="••••••••" required autocomplete="new-password"/>
        </div>
        <!-- Strength indicators -->
        <div class="pwd-reqs" id="pwd-reqs">
          <span class="pwd-req" id="req-len"><i data-lucide="circle" style="width:10px;height:10px"></i> 8+ characters</span>
          <span class="pwd-req" id="req-upper"><i data-lucide="circle" style="width:10px;height:10px"></i> Uppercase letter</span>
          <span class="pwd-req" id="req-num"><i data-lucide="circle" style="width:10px;height:10px"></i> Number</span>
          <span class="pwd-req" id="req-spec"><i data-lucide="circle" style="width:10px;height:10px"></i> Special character</span>
        </div>
        <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
      </div>

      <div style="margin-bottom:24px">
        <label class="label">Confirm password</label>
        <div class="input-wrap">
          <i data-lucide="lock-keyhole" class="i-pfx"></i>
          <input type="password" th:field="*{confirmPassword}" class="input" placeholder="••••••••" required autocomplete="new-password"/>
        </div>
        <p class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-block">
        <i data-lucide="user-plus"></i> Create account
      </button>
    </form>

    <div th:if="${oauthEnabled}">
    <div class="or-divider">Or sign up with</div>
    <a href="/oauth2/authorization/google" class="btn btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </a>
    </div>

    <p style="text-align:center;margin-top:24px;font-size:.83rem;color:#334155">
      Already have an account? <a th:href="@{/login}" style="color:#3b82f6;font-weight:600">Sign in</a>
    </p>
  </div>

  <p style="text-align:center;margin-top:28px;font-size:.75rem;color:#1e3a5f">
    &copy; 2025 Blue Ocean Hub &nbsp;·&nbsp; AI Forex Trading Platform
  </p>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  const pwd = document.getElementById('reg-password');
  if (!pwd) return;
  const rules = {
    'req-len':   p => p.length >= 8,
    'req-upper': p => /[A-Z]/.test(p),
    'req-num':   p => /\d/.test(p),
    'req-spec':  p => /[^a-zA-Z0-9]/.test(p),
  };
  pwd.addEventListener('input', function() {
    Object.entries(rules).forEach(([id, test]) => {
      const el = document.getElementById(id);
      const ok = test(this.value);
      el.classList.toggle('ok', ok);
      el.innerHTML = `<i data-lucide="${ok ? 'check-circle' : 'circle'}" style="width:10px;height:10px"></i> ` + el.textContent.replace(/^\S+\s*/, '');
    });
    lucide.createIcons();
  });
});
</script>
</body>
</html>
