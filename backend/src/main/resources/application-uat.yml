# ── UAT profile — GCP Cloud Run + MetaApi ─────────────────────
# Set these as environment variables in GCP Cloud Run (not hardcoded here)

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:forexbot}?useSSL=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}

services:
  mt5-bridge:
    url: ${MT5_BRIDGE_URL}   # MetaApi REST endpoint
  signal-engine:
    url: ${SIGNAL_ENGINE_URL}

bot:
  paper-trading: true         # Always paper trading in UAT
  scan-interval-seconds: 60
  default-volume: 0.01
  sl-pips: 30.0
  tp-pips: 60.0
  max-open-trades: 3
  symbols: EURUSD,GBPUSD,USDJPY,AUDUSD

logging:
  level:
    com.forexbot: INFO
    org.springframework.web: WARN
