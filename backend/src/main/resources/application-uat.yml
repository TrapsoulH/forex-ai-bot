# ── UAT profile — GCP Cloud Run ────────────────────────────────────────────────
# All secrets are set as Cloud Run environment variables — nothing hardcoded here.
# Deploy with: --set-env-vars DB_USER=...,DB_PASSWORD=...,GOOGLE_CLIENT_ID=... etc.

server:
  forward-headers-strategy: framework   # trust X-Forwarded-Proto from Cloudflare/nginx so OAuth redirects use https://

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=true&serverTimezone=UTC
    # username / password come from DB_USER / DB_PASSWORD (base application.yml)

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile
            redirect-uri: "https://blue-ocean-hub.com/login/oauth2/code/google"

  thymeleaf:
    cache: true

services:
  mt5-bridge:
    url: ${MT5_BRIDGE_URL}
  signal-engine:
    url: ${SIGNAL_ENGINE_URL}

bot:
  paper-trading: true   # always paper in UAT — never real money

logging:
  level:
    com.forexbot: DEBUG
    org.springframework.web: INFO
    org.flywaydb: INFO
