spring:
  config:
    # Loads ../.env in dev (spring-dotenv). No-op when file is absent (UAT/prod uses Cloud Run env vars).
    import: "optional:dotenv:../"

  application:
    name: forex-ai-bot-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:forexbot}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USER}      # required — no default, must be in .env or env var
    password: ${DB_PASSWORD}  # required — no default, must be in .env or env var
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none          # Flyway owns the schema — Hibernate must not touch it
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  # Mail — blank values = console fallback (EmailService logs link instead of sending)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Google OAuth2 registration is defined per-profile so Spring never starts with an empty client-id.
  # See application-dev.yml / application-uat.yml / application-prod.yml.

# Application base URL — used in email links (password reset etc.)
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

server:
  port: ${SERVER_PORT:8080}

# External Python services
services:
  mt5-bridge:
    url: ${MT5_BRIDGE_URL:http://localhost:8001}
  signal-engine:
    url: ${SIGNAL_ENGINE_URL:http://localhost:8002}

# Bot settings — safe non-secret defaults
bot:
  paper-trading: ${PAPER_TRADING:true}
  scan-interval-seconds: ${SCAN_INTERVAL:60}
  default-volume: ${DEFAULT_VOLUME:0.01}
  sl-pips: ${SL_PIPS:30.0}
  tp-pips: ${TP_PIPS:60.0}
  max-open-trades: ${MAX_OPEN_TRADES:3}
  symbols: ${SYMBOLS:EURUSD,GBPUSD,USDJPY,AUDUSD}

logging:
  level:
    com.forexbot: INFO
    org.springframework.web: INFO
