# Blue Ocean Hub — Nginx reverse proxy
# Place at: /etc/nginx/sites-available/blueocean
# Then: sudo ln -s /etc/nginx/sites-available/blueocean /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# Cloudflare sits in front of this — SSL terminates at Cloudflare.
# Set Cloudflare SSL mode to "Full" (not Strict) since this VM uses HTTP.
# Cloudflare → HTTPS → VM on port 80 → Nginx → Spring Boot on 8080

server {
    listen 80;
    server_name blue-ocean-hub.com www.blue-ocean-hub.com app.blue-ocean-hub.com;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    # ── Main proxy to Spring Boot ────────────────────────────────────────────
    location / {
        proxy_pass         http://localhost:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # ── SSE endpoint — disable buffering so events stream immediately ────────
    location /api/dashboard/stream {
        proxy_pass         http://localhost:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection        "";

        # Critical for SSE — no buffering, long timeout
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }
}
