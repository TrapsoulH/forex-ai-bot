<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Blue Ocean Hub — UI Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
/* ── Reset & Base ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040A18;--navy:#0D1F35;--blue:#3B82F6;--green:#10B981;
  --red:#EF4444;--amber:#F59E0B;--purple:#8B5CF6;
  --text:#F1F5F9;--muted:#64748B;--border:rgba(255,255,255,0.07);
  --surface:rgba(13,31,53,0.55);--font:'Outfit',sans-serif;
}
html,body{height:100%;font-family:var(--font);-webkit-tap-highlight-color:transparent}

/* ════════════════════════════════════════
   DESKTOP PROTOTYPE SHELL
════════════════════════════════════════ */
body.desktop-mode{background:#0a0f1a;color:var(--text);overflow:hidden;display:flex;flex-direction:column}

.proto-header{
  background:rgba(4,10,24,0.98);border-bottom:1px solid rgba(255,255,255,.1);
  padding:10px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0;flex-wrap:wrap;z-index:1000;
}
.proto-brand{display:flex;align-items:center;gap:8px;flex-shrink:0}
.proto-logo-box{width:26px;height:26px;background:linear-gradient(135deg,#3B82F6,#10B981);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px}
.proto-brand-name{font-size:.82rem;font-weight:700;color:#f1f5f9}
.proto-tag{font-size:.62rem;background:rgba(59,130,246,.15);color:#3B82F6;border:1px solid rgba(59,130,246,.25);border-radius:4px;padding:1px 6px}
.proto-sep{width:1px;height:24px;background:rgba(255,255,255,.1);flex-shrink:0}
.proto-lbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;flex-shrink:0}

.screen-tabs{display:flex;gap:3px;flex-wrap:wrap}
.screen-tab{padding:5px 12px;border-radius:7px;border:1px solid transparent;font-size:.78rem;font-weight:600;font-family:var(--font);cursor:pointer;background:transparent;color:var(--muted);transition:.15s}
.screen-tab:hover{color:var(--text);background:rgba(255,255,255,.05)}
.screen-tab.active{background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.3);color:var(--blue)}

.device-toggle{display:flex;background:rgba(255,255,255,.05);border-radius:7px;padding:3px;gap:2px;flex-shrink:0}
.device-btn{padding:4px 12px;border-radius:5px;border:none;font-size:.76rem;font-weight:600;font-family:var(--font);cursor:pointer;background:transparent;color:var(--muted);transition:.15s}
.device-btn.active{background:rgba(59,130,246,.2);color:var(--blue)}

.proto-sp{flex:1}

/* Desktop canvas */
.proto-canvas{
  flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:28px 20px;
  background:radial-gradient(ellipse at 30% 20%,rgba(59,130,246,.06) 0%,transparent 60%),
    radial-gradient(ellipse at 70% 80%,rgba(16,185,129,.04) 0%,transparent 60%),#0a0f1a;
}

/* Browser frame */
.browser-frame{width:100%;max-width:1180px;min-width:860px;border-radius:12px;overflow:hidden;box-shadow:0 32px 100px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.08)}
.browser-chrome{background:#151f2e;padding:9px 14px;display:flex;align-items:center;gap:10px}
.b-dots{display:flex;gap:5px}
.b-dot{width:11px;height:11px;border-radius:50%}
.b-dot.r{background:#EF4444}.b-dot.y{background:#F59E0B}.b-dot.g{background:#10B981}
.b-url{background:rgba(255,255,255,.05);border-radius:5px;padding:4px 14px;flex:1;font-size:.7rem;color:var(--muted);font-family:monospace}
.browser-body{max-height:76vh;overflow-y:auto;overflow-x:hidden}
.browser-body::-webkit-scrollbar{width:5px}
.browser-body::-webkit-scrollbar-track{background:transparent}
.browser-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

/* Phone frame */
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.phone-frame{width:385px;height:800px;border:10px solid #1a2535;border-radius:50px;overflow:hidden;box-shadow:0 32px 100px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.08),inset 0 0 0 2px rgba(255,255,255,.05);position:relative;flex-shrink:0}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:100px;height:26px;background:#1a2535;border-radius:0 0 16px 16px;z-index:10}
.phone-body{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg)}
.phone-body::-webkit-scrollbar{display:none}
.phone-lbl{font-size:.7rem;color:var(--muted);text-align:center}

/* ════════════════════════════════════════
   MOBILE NATIVE SHELL (real phone)
════════════════════════════════════════ */
body.mobile-mode{background:var(--bg);color:var(--text);overflow:hidden;display:flex;flex-direction:column;height:100dvh}

/* Slim mobile proto bar */
.mobile-proto-bar{
  display:none;background:rgba(4,10,24,.98);border-bottom:1px solid rgba(255,255,255,.08);
  padding:10px 16px;padding-top:calc(10px + env(safe-area-inset-top));
  flex-shrink:0;z-index:500;
}
.mobile-proto-bar-inner{display:flex;align-items:center;gap:10px}
.mpb-logo{display:flex;align-items:center;gap:7px}
.mpb-logo-box{width:22px;height:22px;background:linear-gradient(135deg,#3B82F6,#10B981);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px}
.mpb-name{font-size:.78rem;font-weight:700;color:#f1f5f9}
.mpb-badge{font-size:.58rem;background:rgba(59,130,246,.15);color:#3B82F6;border:1px solid rgba(59,130,246,.25);border-radius:3px;padding:1px 5px}
.mpb-sp{flex:1}
.mpb-screen{font-size:.72rem;color:var(--muted);font-weight:600}

/* Mobile screen tabs (horizontal scroll) */
.mobile-screen-tabs{
  display:none;background:rgba(4,10,24,.95);border-bottom:1px solid rgba(255,255,255,.06);
  padding:8px 12px;flex-shrink:0;overflow-x:auto;white-space:nowrap;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.mobile-screen-tabs::-webkit-scrollbar{display:none}
.mobile-tab{display:inline-block;padding:6px 14px;border-radius:7px;border:1px solid transparent;font-size:.76rem;font-weight:600;font-family:var(--font);cursor:pointer;background:transparent;color:var(--muted);margin-right:4px;transition:.15s;white-space:nowrap}
.mobile-tab.active{background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.3);color:var(--blue)}

/* Mobile content area */
.mobile-content{
  display:none;flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  padding-bottom:calc(64px + env(safe-area-inset-bottom));
}
.mobile-content::-webkit-scrollbar{display:none}

/* Mobile bottom nav */
.mobile-bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:rgba(4,10,24,.97);backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,.08);
  padding:6px 4px;padding-bottom:calc(6px + env(safe-area-inset-bottom));
  z-index:500;
}
.mobile-bottom-nav-inner{display:flex;justify-content:space-around;align-items:center}
.mbn-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 10px;border-radius:8px;border:none;background:transparent;font-family:var(--font);cursor:pointer;flex:1;max-width:80px;transition:.15s}
.mbn-icon{font-size:18px;line-height:1}
.mbn-label{font-size:.58rem;font-weight:600;color:var(--muted);transition:.15s}
.mbn-btn.active .mbn-label{color:var(--blue)}
.mbn-btn.active .mbn-icon{filter:drop-shadow(0 0 6px rgba(59,130,246,.6))}

/* ════════════════════════════════════════
   APP DESIGN SYSTEM (shared)
════════════════════════════════════════ */
.app{background:var(--bg);min-height:100%;font-family:var(--font);color:var(--text);position:relative}
.orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb1{width:350px;height:350px;background:rgba(59,130,246,.08);top:-80px;right:-40px}
.orb2{width:280px;height:280px;background:rgba(16,185,129,.06);bottom:80px;left:-60px}
.orb3{width:180px;height:180px;background:rgba(139,92,246,.05);top:45%;left:45%}

/* Top nav */
.topnav{position:sticky;top:0;z-index:100;background:rgba(4,10,24,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;gap:4px}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-right:8px;flex-shrink:0}
.logo-box{width:28px;height:28px;background:linear-gradient(135deg,#3B82F6,#10B981);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.logo-name{font-size:.84rem;font-weight:700;color:#f1f5f9}
.grad{background:linear-gradient(135deg,#3B82F6,#10B981);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-tag{font-size:.58rem;background:rgba(59,130,246,.12);color:#3B82F6;border:1px solid rgba(59,130,246,.2);border-radius:4px;padding:1px 5px}
.nav-a{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;font-size:.78rem;font-weight:600;color:var(--muted);text-decoration:none}
.nav-a.active,.nav-a:hover{color:var(--text);background:rgba(255,255,255,.05)}
.nav-a.active{color:var(--blue)}
.nav-sp{flex:1}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:600;white-space:nowrap}
.b-run{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.2)}
.b-stop{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.18)}
.b-closed{background:rgba(100,116,139,.12);color:#94a3b8;border:1px solid rgba(100,116,139,.2)}
.dot{width:6px;height:6px;border-radius:50%}
.dot-g{background:#10B981}.dot-r{background:#EF4444}.dot-grey{background:#64748B}
.nav-user{display:flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);font-size:.76rem;cursor:pointer}
.btn-logout{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.18);color:#f87171;border-radius:7px;padding:4px 10px;font-size:.73rem;font-weight:600;font-family:var(--font);cursor:pointer}
.mob-ham{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px;margin-left:4px}
.mob-ham span{display:block;width:20px;height:2px;background:var(--muted);border-radius:2px}

/* Page */
.page{position:relative;z-index:1;padding:22px 22px 40px;max-width:1160px;margin:0 auto}
.page-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.ic{display:flex;align-items:center;justify-content:center;border-radius:11px;font-size:16px;flex-shrink:0}
.ic-md{width:40px;height:40px}
.ic-sm{width:30px;height:30px;font-size:13px}
.ic-blue{background:rgba(59,130,246,.15);color:var(--blue)}
.ic-green{background:rgba(16,185,129,.12);color:var(--green)}
.ic-red{background:rgba(239,68,68,.1);color:var(--red)}
.ic-purple{background:rgba(139,92,246,.12);color:var(--purple)}
.page-title{font-size:1.3rem;font-weight:700;color:var(--text)}
.page-sub{font-size:.78rem;color:var(--muted);margin-top:2px}
.ph-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* Stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;backdrop-filter:blur(10px)}
.sc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sc-lbl{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.sc-val{font-size:1.4rem;font-weight:700;color:var(--text);line-height:1}
.sc-sub{font-size:.7rem;color:var(--muted);margin-top:4px}
.pos{color:var(--green)}.neg{color:var(--red)}

/* Glass card */
.gcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;backdrop-filter:blur(10px);overflow:hidden}
.gcard-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.gcard-title{font-size:.88rem;font-weight:700}
.gcard-sub{font-size:.72rem;color:var(--muted);margin-top:2px}
.gcard-body{padding:16px 18px}

/* Tables */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl-wrap-h{max-height:220px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:.78rem;min-width:480px}
thead th{padding:9px 12px;text-align:left;font-size:.67rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;position:sticky;top:0;background:#091525;border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--text);vertical-align:middle}
tbody tr:last-child td{border:none}
tbody tr:hover td{background:rgba(255,255,255,.02)}
.td-mono{font-family:monospace;font-size:.75rem}

/* Direction badges */
.dir{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:5px;font-size:.7rem;font-weight:700;white-space:nowrap}
.dir-buy{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.2)}
.dir-sell{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.18)}
.dir-hold{background:rgba(100,116,139,.1);color:#94a3b8;border:1px solid rgba(100,116,139,.18)}

/* Confidence bar */
.conf-bar{display:flex;align-items:center;gap:7px}
.conf-track{flex:1;height:4px;background:rgba(255,255,255,.07);border-radius:2px;min-width:40px}
.conf-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--green))}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;font-family:var(--font);font-weight:600;font-size:.78rem;cursor:pointer;border:none;transition:.15s;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff}
.btn-ghost{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted)}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171}
.btn-sm{padding:3px 9px;font-size:.7rem}
.btn-bot-start{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;border-radius:9px;border:none;font-family:var(--font);font-weight:700;font-size:.8rem;cursor:pointer;background:linear-gradient(135deg,#10B981,#059669);color:#fff;box-shadow:0 4px 16px rgba(16,185,129,.3)}
.btn-bot-stop{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;border-radius:9px;border:1px solid rgba(239,68,68,.3);font-family:var(--font);font-weight:700;font-size:.8rem;cursor:pointer;background:rgba(239,68,68,.1);color:#f87171}
.btn-auth{width:100%;padding:10px;border-radius:9px;border:none;background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;font-family:var(--font);font-size:.86rem;font-weight:700;cursor:pointer;margin-top:4px}
.btn-google{width:100%;padding:9px;border-radius:9px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-family:var(--font);font-size:.82rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}

/* Role / status badges */
.role-admin{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.2);border-radius:5px;padding:2px 7px;font-size:.68rem;font-weight:700}
.role-user{background:rgba(100,116,139,.1);color:#94a3b8;border:1px solid rgba(100,116,139,.18);border-radius:5px;padding:2px 7px;font-size:.68rem;font-weight:700}
.st-on{background:rgba(16,185,129,.1);color:#34d399;border:1px solid rgba(16,185,129,.18);border-radius:5px;padding:2px 7px;font-size:.68rem;font-weight:700}
.st-off{background:rgba(239,68,68,.08);color:#f87171;border:1px solid rgba(239,68,68,.15);border-radius:5px;padding:2px 7px;font-size:.68rem;font-weight:700}
.paper-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:.66rem;font-weight:700;background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}

/* Live dot */
.live-dot{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--green);white-space:nowrap}
.live-pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}50%{box-shadow:0 0 0 5px rgba(16,185,129,0)}}
.sse-badge{display:flex;align-items:center;gap:5px;font-size:.68rem;color:var(--green);background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.15);border-radius:5px;padding:3px 8px}

/* Forms */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.74rem;font-weight:600;color:var(--muted);margin-bottom:5px}
.form-input{width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-family:var(--font);font-size:.82rem;outline:none}
.form-input:focus{border-color:var(--blue)}

/* Toggle */
.toggle-wrap{display:flex;align-items:center;gap:9px}
.toggle{width:40px;height:22px;background:rgba(255,255,255,.1);border-radius:11px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle.on::after{left:21px}
.toggle-lbl{font-size:.8rem;font-weight:600;color:var(--text)}

/* Chart containers */
.chart-h{position:relative;height:220px}
.chart-h-sm{position:relative;height:175px}

/* Grid layouts */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.gap-md{gap:16px}
.mb-20{margin-bottom:20px}
.mb-16{margin-bottom:16px}

/* Symbol rows */
.sym-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.sym-row:last-child{border:none}
.sym-name{font-size:.8rem;font-weight:700;min-width:64px}
.sym-in{flex:1;padding:5px 8px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-family:var(--font);font-size:.76rem;min-width:0;width:56px}

/* Auth */
.auth-page{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{background:rgba(13,31,53,.7);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:380px;backdrop-filter:blur(20px)}
.auth-or{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--muted);font-size:.73rem}
.auth-or::before,.auth-or::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-link{text-align:center;font-size:.75rem;color:var(--muted);margin-top:14px}
.auth-link a{color:var(--blue)}

/* Landing */
.pub-nav{position:sticky;top:0;z-index:100;background:rgba(4,10,24,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 32px;height:58px;display:flex;align-items:center;gap:14px}
.pub-nav-a{padding:5px 12px;border-radius:7px;font-size:.78rem;color:var(--muted);cursor:pointer;font-weight:600}
.pub-nav-login{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);padding:5px 14px;border-radius:7px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:var(--font)}
.pub-nav-cta{background:linear-gradient(135deg,#3B82F6,#10B981);color:#fff;border:none;padding:6px 16px;border-radius:7px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:var(--font)}
.hero{position:relative;z-index:1;padding:64px 32px 48px;text-align:center}
.hero-eyebrow{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:var(--green);font-size:.72rem;font-weight:600;margin-bottom:16px}
.hero-title{font-size:2.8rem;font-weight:800;line-height:1.1;margin-bottom:16px}

/* ════════════════════════════════════════
   RENDER ENGINE
════════════════════════════════════════ */
let curScreen = 'landing';
let curDevice = 'desktop';
let chartInst = [];

function destroyCharts() {
  Chart.instances && Object.values(Chart.instances).forEach(c => { try{c.destroy()}catch(e){} });
}

function renderDesktop() {
  destroyCharts();
  const isMob = curDevice === 'mobile';
  const wrapClass = isMob ? 'mob-wrap' : '';
  const html = SCREENS[curScreen] || '';

  if (isMob) {
    document.getElementById('protoCanvas').innerHTML = `
      <div class="phone-wrap">
        <div class="phone-frame">
          <div class="phone-notch"></div>
          <div class="phone-body ${wrapClass}">${html}</div>
        </div>
        <div class="phone-lbl">iPhone 14 Pro · 390×844</div>
      </div>`;
  } else {
    document.getElementById('protoCanvas').innerHTML = `
      <div class="browser-frame">
        <div class="browser-chrome">
          <div class="b-dots"><div class="b-dot r"></div><div class="b-dot y"></div><div class="b-dot g"></div></div>
          <div class="b-url">🔒 ${URL_MAP[curScreen]||'localhost:8080'}</div>
        </div>
        <div class="browser-body ${wrapClass}">${html}</div>
      </div>`;
  }
  if (curScreen === 'analytics') setTimeout(buildCharts, 60);
}

function renderMobile() {
  destroyCharts();
  const html = SCREENS[curScreen] || '';
  document.getElementById('mobileContent').innerHTML = html;
  document.getElementById('mobileContent').scrollTop = 0;
  document.getElementById('mobileScreenLabel').textContent = SCREEN_NAMES[curScreen] || '';
  if (curScreen === 'analytics') setTimeout(buildCharts, 60);
}

function setScreen(s) {
  curScreen = s;
  const isReal = document.body.classList.contains('mobile-mode');
  if (isReal) {
    document.querySelectorAll('.mobile-tab').forEach(t => t.classList.toggle('active', t.dataset.s === s));
    document.querySelectorAll('.mbn-btn').forEach(t => t.classList.toggle('active', t.dataset.s === s));
    // Auto-scroll the tab into view
    const activeTab = document.querySelector(`.mobile-tab[data-s="${s}"]`);
    if (activeTab) activeTab.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
    renderMobile();
  } else {
    document.querySelectorAll('.screen-tab').forEach(t => t.classList.toggle('active', t.dataset.s === s));
    renderDesktop();
  }
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
function init() {
  const isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

  if (isMobile) {
    document.body.classList.add('mobile-mode');
    renderMobile();
  } else {
    document.body.classList.add('desktop-mode');
    renderDesktop();
  }

  // Desktop: screen tabs
  document.getElementById('desktopScreenTabs')?.addEventListener('click', e => {
    const b = e.target.closest('[data-s]');
    if (b) setScreen(b.dataset.s);
  });

  // Desktop: device toggle
  document.getElementById('deviceToggle')?.addEventListener('click', e => {
    const b = e.target.closest('[data-d]');
    if (!b) return;
    curDevice = b.dataset.d;
    document.querySelectorAll('.device-btn').forEach(t => t.classList.toggle('active', t === b));
    renderDesktop();
  });

  // Mobile: screen tabs (horizontal scroll strip)
  document.getElementById('mobileScreenTabs')?.addEventListener('click', e => {
    const b = e.target.closest('[data-s]');
    if (b) setScreen(b.dataset.s);
  });

  // Mobile: bottom nav
  document.getElementById('mobileBottomNav')?.addEventListener('click', e => {
    const b = e.target.closest('[data-s]');
    if (b) setScreen(b.dataset.s);
  });

  // Handle resize (e.g. rotating device)
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const nowMobile = window.innerWidth <= 768;
      if (nowMobile && !document.body.classList.contains('mobile-mode')) {
        document.body.classList.replace('desktop-mode','mobile-mode');
        renderMobile();
      } else if (!nowMobile && !document.body.classList.contains('desktop-mode')) {
        document.body.classList.replace('mobile-mode','desktop-mode');
        renderDesktop();
      }
    }, 200);
  });
}

init();
</script>
